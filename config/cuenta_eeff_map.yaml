# Mapeo de cuentas EEFF: cuenta_codigo_canonical → variantes de nombre normalizadas
#
# Normalización aplicada antes de comparar:
#   1. NFKD + ascii → elimina acentos y encoding roto
#   2. lowercase
#   3. strip trailing "(+ o -)", "(+)", "(-)", "(+ o -)", "(+ o -)" y variantes
#   4. strip trailing "- Trimestre ..." (breakdowns APO)
#   5. strip whitespace
#
# patterns: lista de strings normalizados. Se usa startswith() para capturar
# variantes menores que no valga la pena listar exhaustivamente.

